<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

/* Titles */
h2 {
    margin: 20px 0 10px 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

/* Movie Card */
.movie {
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.movie:hover {
    transform: scale(1.05);
}

/* Player */
.player {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.player iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 32px;
    cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
    .grid { gap: 8px; padding: 0 5px 15px; }
    .logo { font-size: 24px; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>
   <!--
    <div class="logo">  <a href="newsam/index.html">Stream</a></div>
    -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search movies...">
    </div>
</div>

<div id="mainContainer"></div>

<!-- Player -->
<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
    let visible = 20; // how many load first
const step = 8;  // how many load each scroll
// Movies
const movies = [
    { id: "tt8887436", title: "Coming Soon", img: "" },
    // cartoon
    {"id": "tt27613895", title: "GOAT", "img": "https://www.themoviedb.org/t/p/w600_and_h900_face/wfuqMlaExcoYiUEvKfVpUTt1v4u.jpg"},
    
    { "id": "tt2948356", title: "Zootopia", "img": "https://www.themoviedb.org/t/p/w600_and_h900_face/9LRFNLthb0jfWC0HUDUWjYgpP9F.jpg"},
    { "id": "1084242",   title: "Zootopia 2", "img": "https://www.themoviedb.org/t/p/w600_and_h900_face/bjUWGw0Ao0qVWxagN3VCwBJHVo6.jpg" },
    
    { "id": "tt15678738", title: "David", "img": "https://www.themoviedb.org/t/p/w600_and_h900_face/7lFG1WrCwAxBfyGK8ahlBVzXno7.jpg" },
    
    { id: "tt18259086", title: "Sonic the Hedgehog 3", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/nyEr1VqvKx1YiesMC3oTB2fZvpY.jpg" },
    
    { id: "tt28650488", title: "Mario Galaxy", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/aSmAmNAK2VYfb0rYlleYJ10s3CC.jpg" },
    { id: "tt6718170", title: "Super Mario Bros", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/uzNSqyEhB0Dsnmwjwslrez37jY5.jpg" },
    { id: "tt0108255", title: "Super Mario Bros 1993", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/cudfWiiFDxj8rq1Myolzv6yY3ah.jpg" },
    
    { id: "tt26443616", title: "Hoppers", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/xjtWQ2CL1mpmMNwuU5HeS4Iuwuu.jpg" },
    //movie sets


    //movies
    { id: "tt12042730", title: "Project Hail Mary", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/wXmoUdNvLx8Iiplgbuc1svl3b2d.jpg" },
    { id: "tt1375666", title: "Inception", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/xlaY2zyzMfkhk0HSC5VUwzoZPU1.jpg" },
    { id: "tt0816692", title: "Interstellar", img: "https://www.themoviedb.org/t/p/w600_and_h900_face/yQvGrMoipbRoddT0ZR8tPoR7NfX.jpg" },
    { id: "tt0468569", title: "Dark Knight", img: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" },
    { id: "tt0111161", title: "Shawshank", img: "https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg" }
];

// Render
function displayAll() {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "<h2>Movies</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";
    grid.id = "movieGrid";

    movies.slice(0, visible).forEach(m => {
        grid.appendChild(createCard(m));
    });

    container.appendChild(grid);
}


// Card
function createCard(movie) {
    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `
        <img src="${movie.img}">
        <div class="title">${movie.title}</div>
    `;

    div.onclick = () => playMovie(movie.id);
    return div;
}

// Play
function playMovie(id) {
    if (!id) return alert("Not available");

    document.getElementById("frame").src = `https://www.2embed.cc/embed/${id}`;
    document.getElementById("player").style.display = "flex";
}

// Close
function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

// Search
document.getElementById("search").addEventListener("input", function () {
    const value = this.value.toLowerCase();
    const filtered = movies.filter(m => m.title.toLowerCase().includes(value));

    const container = document.getElementById("mainContainer");
    container.innerHTML = "<h2>Search Results</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(m => grid.appendChild(createCard(m)));
    container.appendChild(grid);
});

// Init
displayAll();
</script>

</body>
</html>
