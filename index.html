<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

/* Titles */
h2 {
    margin: 20px 0 10px 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

/* Movie Card */
.movie {
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.movie:hover {
    transform: scale(1.1);
}

/* Player */
.player {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.player iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 32px;
    cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
    .grid { gap: 8px; padding: 0 5px 15px; }
    .logo { font-size: 24px; }
}
</style>

let currentView = "home"; // home | set
let currentSet = null;

/* ---------------- GROUP MOVIE SETS ---------------- */

function buildSets() {
    const sets = {};

    movies
        .filter(m => m.category === "MovieSet")
        .forEach(m => {

            const key = m.set || "Other Set";

            if (!sets[key]) sets[key] = [];
            sets[key].push(m);
        });

    return sets;
}
/* ---------------- RENDER HOME ---------------- */

function displayAll() {
    currentView = "home";
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const sets = buildSets();

    /* ================= MOVIE SETS ================= */
    const setSection = document.createElement("div");
    setSection.innerHTML = `<h2>Movie Sets</h2>`;

    const setGrid = document.createElement("div");
    setGrid.className = "grid";

    Object.keys(sets).forEach(setName => {
        const firstMovie = sets[setName][0];

        const card = document.createElement("div");
        card.className = "movie";

        card.innerHTML = `
            <img src="${firstMovie.img}">
            <div class="title">${setName}</div>
        `;

        card.onclick = () => openSet(setName, sets[setName]);

        setGrid.appendChild(card);
    });

    setSection.appendChild(setGrid);
    container.appendChild(setSection);

    /* ================= OTHER CATEGORIES ================= */

    const categories = [...new Set(movies.map(m => m.category))];

    categories.forEach(cat => {

        // skip MovieSet because it's already handled above
        if (cat === "MovieSet") return;

        const section = document.createElement("div");
        section.innerHTML = `<h2>${cat}</h2>`;

        const grid = document.createElement("div");
        grid.className = "grid";

        movies
            .filter(m => m.category === cat)
            .forEach(m => grid.appendChild(createCard(m)));

        section.appendChild(grid);
        container.appendChild(section);
    });
}
/* ---------------- OPEN SET ---------------- */

function openSet(name, list) {
    currentView = "set";
    currentSet = list;

    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const backBtn = document.createElement("button");
    backBtn.innerText = "← Back";
    backBtn.style.margin = "10px";
    backBtn.style.padding = "10px";
    backBtn.onclick = displayAll;

    const title = document.createElement("h2");
    title.innerText = name;

    const grid = document.createElement("div");
    grid.className = "grid";

    list.forEach(m => grid.appendChild(createCard(m)));

    container.appendChild(backBtn);
    container.appendChild(title);
    container.appendChild(grid);
}

/* ---------------- CARD ---------------- */

function createCard(movie) {
    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `
        <img src="${movie.img}">
        <div class="title">${movie.title}</div>
    `;

    div.onclick = () => playMovie(movie.id);
    return div;
}

/* ---------------- PLAYER ---------------- */

function playMovie(id) {
    if (!id) return alert("Not available");

    document.getElementById("frame").src = `https://www.2embed.cc/embed/${id}`;
    document.getElementById("player").style.display = "flex";
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";
}

/* ---------------- SEARCH ---------------- */

document.getElementById("search").addEventListener("input", function () {
    const value = this.value.toLowerCase();

    const filtered = movies.filter(m =>
        m.title.toLowerCase().includes(value)
    );

    const container = document.getElementById("mainContainer");
    container.innerHTML = "<h2>Search Results</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(m => grid.appendChild(createCard(m)));

    container.appendChild(grid);
});

/* INIT */
displayAll();
