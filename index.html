<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>

<div style="position:fixed; top:10px; left:10px; z-index:9999; display:flex; gap:10px;">

  <a href="https://isa-flix.github.io/samflix/" 
     title="Main SamFlix"
     style="padding:10px; background:#111; color:white; text-decoration:none; border-radius:50%; font-size:18px;">
     🎬
  </a>

  <a href="https://isa-flix.github.io/samflix/newsam/" 
     title="NewSam"
     style="padding:10px; background:#111; color:white; text-decoration:none; border-radius:50%; font-size:18px;">
     📺
  </a>

</div>
    
    <div class="search-box">
        <input type="text" id="search" placeholder="Search movies...">
    </div>
</div>

<div id="mainContainer"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="app.js"></script>

</body>
</html>
