<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

h2 {
    margin: 20px 0 10px 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

/* Movie Card */
.movie {
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.movie:hover {
    transform: scale(1.1);
}

/* Player */
.player {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.player iframe,
.player video {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 32px;
    cursor: pointer;
}

@media (max-width: 600px) {
    .grid { gap: 8px; padding: 0 5px 15px; }
    .logo { font-size: 24px; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Search movies...">
    </div>
</div>

<div id="mainContainer"></div>

<!-- Player -->
<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>

    <!-- VIDEO PLAYER -->
    <video id="videoPlayer" controls autoplay style="display:none;"></video>

    <!-- IFRAME PLAYER -->
    <iframe id="frame" allowfullscreen style="display:none;"></iframe>
</div>

<script>
let visible = 20;
const step = 8;

// ================= YOUR MOVIE DATA (UNCHANGED) =================
const movies = [

    {
  id: "tt1375666",
  title: "Inception",
  img: "https://www.themoviedb.org/t/p/w600_and_h900_face/xlaY2zyzMfkhk0HSC5VUwzoZPU1.jpg",
  category: "01Test",
  video: "https://test-streams.mux.dev/x36xhzz/x36xhzz.mp4" // ✅ sample working mp4
},
    {"id":"tt27613895",title:"GOAT",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/wfuqMlaExcoYiUEvKfVpUTt1v4u.jpg",category:"Cartoons"},
    {"id":"tt15678738",title:"David",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/7lFG1WrCwAxBfyGK8ahlBVzXno7.jpg",category:"Cartoons"},
    {id:"tt26443616",title:"Hoppers",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/xjtWQ2CL1mpmMNwuU5HeS4Iuwuu.jpg",category:"Cartoons"},

    {id:"tt15398776",title:"Oppenheimer",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/2y48XTa483LRFIb5fDKOwr8DHWz.jpg",category:"Movie"},
    {id:"tt12042730",title:"Project Hail Mary",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/wXmoUdNvLx8Iiplgbuc1svl3b2d.jpg",category:"Movie"},
    {id:"tt0816692",title:"Interstellar",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/yQvGrMoipbRoddT0ZR8tPoR7NfX.jpg",category:"Movie"},

    {"id":"tt0114709",title:"Toy Story",img:"https://www.themoviedb.org/t/p/w1280/uXDfjJbdP4ijW5hWSBrPrlKpxab.jpg",category:"MovieSet",set:"Toy story"},
    {"id":"tt0120363",title:"Toy Story 2",img:"https://www.themoviedb.org/t/p/w1280/4rbcp3ng8n1MKHjpeqW0L7Fnpzz.jpg",category:"MovieSet",set:"Toy story"},

    {id:"tt3794354",title:"Sonic the Hedgehog",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/bljXY2zZSD6poD4dOPwIxQkFTUB.jpg",category:"MovieSet",set:"Sonic the Hedgehog"},
    {id:"tt12412888",title:"Sonic the Hedgehog 2",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/8E7mIpEpSATxX5JEuw55GYx9hfk.jpg",category:"MovieSet",set:"Sonic the Hedgehog"}
];

// ================= LOGIC =================

function buildSets() {
    const sets = {};
    movies.filter(m => m.category === "MovieSet").forEach(m => {
        if (!sets[m.set]) sets[m.set] = [];
        sets[m.set].push(m);
    });
    return sets;
}

function displayAll() {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const sets = buildSets();

    const setGrid = document.createElement("div");
    setGrid.className = "grid";

    Object.keys(sets).forEach(setName => {
        const firstMovie = sets[setName][0];

        const card = document.createElement("div");
        card.className = "movie";
        card.innerHTML = `<img src="${firstMovie.img}"><div class="title">${setName}</div>`;
        card.onclick = () => openSet(setName, sets[setName]);

        setGrid.appendChild(card);
    });

    container.innerHTML += "<h2>Movie Sets</h2>";
    container.appendChild(setGrid);

    const categories = [...new Set(movies.map(m => m.category))];

    categories.forEach(cat => {
        if (cat === "MovieSet") return;

        const grid = document.createElement("div");
        grid.className = "grid";

        movies.filter(m => m.category === cat)
              .forEach(m => grid.appendChild(createCard(m)));

        container.innerHTML += `<h2>${cat}</h2>`;
        container.appendChild(grid);
    });
}

function openSet(name, list) {
    const container = document.getElementById("mainContainer");
    container.innerHTML = `<button onclick="displayAll()">← Back</button><h2>${name}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    list.forEach(m => grid.appendChild(createCard(m)));
    container.appendChild(grid);
}

function createCard(movie) {
    const div = document.createElement("div");
    div.className = "movie";
    div.innerHTML = `<img src="${movie.img}"><div class="title">${movie.title}</div>`;

    div.onclick = () => playMovie(movie); // ✅ IMPORTANT FIX
    return div;
}

// ================= PLAYER =================

function playMovie(movie) {
    if (!movie) return;

    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    // RESET
    video.pause();
    video.removeAttribute("src");
    video.load();

    frame.src = "";
    frame.style.display = "none";
    video.style.display = "none";

    // PLAY LOGIC
    if (movie.video && movie.video.trim() !== "") {
        video.style.display = "block";
        video.src = movie.video;

        video.play().catch(() => {});
    } 
    else if (movie.id && movie.id.startsWith("tt")) {
        frame.style.display = "block";
        frame.src = `https://www.2embed.cc/embed/${movie.id}`;
    } 
    else {
        alert("No valid source");
        return;
    }

    player.style.display = "flex";
}
    function closePlayer() {
    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    // FULL RESET
    video.pause();
    video.removeAttribute("src");
    video.load();

    frame.src = "";

    player.style.display = "none";
}
// ================= SEARCH =================

document.getElementById("search").addEventListener("input", function () {
    const value = this.value.toLowerCase();
    const filtered = movies.filter(m => m.title.toLowerCase().includes(value));

    const container = document.getElementById("mainContainer");
    container.innerHTML = "<h2>Search Results</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(m => grid.appendChild(createCard(m)));
    container.appendChild(grid);
});

displayAll();
</script>

</body>
</html>
