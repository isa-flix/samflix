<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    background: #141414;
    z-index: 100;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

/* Titles */
h2 {
    margin: 20px 0 10px 10px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

/* Movie Card */
.movie {
    cursor: pointer;
    transition: transform 0.3s;
    position: relative;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.movie:hover {
    transform: scale(1.08);
}

/* Player */
.player {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

video, iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}

/* Mobile */
@media (max-width: 600px) {
    .grid { gap: 8px; }
    .logo { font-size: 22px; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Search movies...">
    </div>
</div>

<div id="mainContainer"></div>

<!-- Player -->
<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>

    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<!-- HLS Library -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const movies = [
    // Movies
    {
        id: "tt1375666",
        title: "Inception",
        img: "https://image.tmdb.org/t/p/w500/xlaY2zyzMfkhk0HSC5VUwzoZPU1.jpg",
        category: "Movies",
        video: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    },
    {
        id: "tt0816692",
        title: "Interstellar",
        img: "https://image.tmdb.org/t/p/w500/yQvGrMoipbRoddT0ZR8tPoR7NfX.jpg",
        category: "Movies",
        video: "https://www.w3schools.com/html/mov_bbb.mp4"
    },

    // Movie Set
    {
        id: "1",
        title: "Toy Story",
        img: "https://image.tmdb.org/t/p/w500/uXDfjJbdP4ijW5hWSBrPrlKpxab.jpg",
        category: "MovieSet",
        set: "Toy Story",
        video: "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        id: "2",
        title: "Toy Story 2",
        img: "https://image.tmdb.org/t/p/w500/4rbcp3ng8n1MKHjpeqW0L7Fnpzz.jpg",
        category: "MovieSet",
        set: "Toy Story",
        video: "https://www.w3schools.com/html/movie.mp4"
    }
];

/* ---------------- GROUP SETS ---------------- */
function buildSets() {
    const sets = {};
    movies.filter(m => m.category === "MovieSet").forEach(m => {
        if (!sets[m.set]) sets[m.set] = [];
        sets[m.set].push(m);
    });
    return sets;
}

/* ---------------- RENDER HOME ---------------- */
function displayAll() {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const sets = buildSets();

    // Movie Sets
    const setSection = document.createElement("div");
    setSection.innerHTML = "<h2>Movie Sets</h2>";

    const setGrid = document.createElement("div");
    setGrid.className = "grid";

    Object.keys(sets).forEach(name => {
        const first = sets[name][0];

        const card = document.createElement("div");
        card.className = "movie";

        card.innerHTML = `
            <img src="${first.img}">
            <div class="title">${name}</div>
        `;

        card.onclick = () => openSet(name, sets[name]);
        setGrid.appendChild(card);
    });

    setSection.appendChild(setGrid);
    container.appendChild(setSection);

    // Movies
    const moviesSection = document.createElement("div");
    moviesSection.innerHTML = "<h2>Movies</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    movies.filter(m => m.category === "Movies")
        .forEach(m => grid.appendChild(createCard(m)));

    moviesSection.appendChild(grid);
    container.appendChild(moviesSection);
}

/* ---------------- OPEN SET ---------------- */
function openSet(name, list) {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const back = document.createElement("button");
    back.innerText = "← Back";
    back.style.margin = "10px";
    back.onclick = displayAll;

    const title = document.createElement("h2");
    title.innerText = name;

    const grid = document.createElement("div");
    grid.className = "grid";

    list.forEach(m => grid.appendChild(createCard(m)));

    container.appendChild(back);
    container.appendChild(title);
    container.appendChild(grid);
}

/* ---------------- CARD ---------------- */
function createCard(movie) {
    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `
        <img src="${movie.img}">
        <div class="title">${movie.title}</div>
    `;

    div.onclick = () => playMovie(movie);
    return div;
}

/* ---------------- PLAYER ---------------- */
function playMovie(movie) {
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    video.pause();
    video.style.display = "none";
    frame.style.display = "none";

    if (!movie.video) {
        frame.src = `https://www.2embed.cc/embed/${movie.id}`;
        frame.style.display = "block";
    }
    else if (movie.video.endsWith(".mp4")) {
        video.src = movie.video;
        video.style.display = "block";
        video.play();
    }
    else if (movie.video.endsWith(".m3u8")) {
        video.style.display = "block";

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(movie.video);
            hls.attachMedia(video);
        } else {
            video.src = movie.video;
        }
    }

    document.getElementById("player").style.display = "flex";
}

/* ---------------- CLOSE ---------------- */
function closePlayer() {
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    video.pause();
    video.src = "";
    frame.src = "";

    document.getElementById("player").style.display = "none";
}

/* ---------------- SEARCH ---------------- */
document.getElementById("search").addEventListener("input", function () {
    const val = this.value.toLowerCase();

    const filtered = movies.filter(m =>
        m.title.toLowerCase().includes(val)
    );

    const container = document.getElementById("mainContainer");
    container.innerHTML = "<h2>Search Results</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(m => grid.appendChild(createCard(m)));

    container.appendChild(grid);
});

/* INIT */
displayAll();
</script>

</body>
</html>
