<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Unified Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* NAV */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    background: #141414;
    z-index: 999;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

/* NAV BUTTONS */
.nav-buttons {
    position: fixed;
    top: 10px;
    left: 220px;
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.nav-buttons a {
    padding: 10px;
    background: #111;
    color: white;
    text-decoration: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

/* GRID */
h2 {
    margin: 20px 10px 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

.card {
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.card .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 13px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.card:hover {
    transform: scale(1.06);
}

/* PLAYER */
.player {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

video, iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

button {
    margin: 10px;
    padding: 8px 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>

    <div class="nav-buttons">
        <a onclick="switchView('movies')">🎬</a>
        <a onclick="switchView('series')">📺</a>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search...">
    </div>
</div>

<div id="app"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<script>

/* =========================
   FULL DATA (UNCHANGED LOGIC)
========================= */

let movies = [
{
    id: "001hls",
    title: "Willow Sports",
    img: "live.png",
    category: "Live Stream",
    video: "https://amg01269-amg01269c1-firetv-us-5377.playouts.now.amagi.tv/playlist.m3u8"
},
{
    id: "tt15398776",
    title: "Oppenheimer",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/2y48XTa483LRFIb5fDKOwr8DHWz.jpg",
    category: "Movie"
},
{
    id: "tt0317219",
    title: "Cars 2006",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/u4G8EkiIBZYx0wEg2xDlXZigTOZ.jpg",
    category: "MovieSet",
    set: "Cars"
},
{
    id: "tt1216475",
    title: "Cars 2 2011",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/vu2PuKtP24Php0vKzhEKbqft59Q.jpg",
    category: "MovieSet",
    set: "Cars"
}
];

let seriesList = [
{
    id: "stranger_things",
    title: "Stranger Things",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/cVxVGwHce6xnW8UaVUggaPXbmoE.jpg",
    tmdb_id: "66732",
    seasons: [
        { season: 1, episodes: 8 },
        { season: 2, episodes: 9 },
        { season: 3, episodes: 8 },
        { season: 4, episodes: 9 }
    ]
}
];

/* =========================
   STATE
========================= */

let currentView = "movies";
let hlsInstance = null;

/* =========================
   INIT
========================= */

document.addEventListener("DOMContentLoaded", () => {
    renderMovies();
});

/* =========================
   VIEW SWITCH
========================= */

function switchView(v) {
    currentView = v;
    document.getElementById("search").value = "";
    render();
}

function render() {
    if (currentView === "movies") renderMovies();
    else renderSeries();
}

/* =========================
   MOVIES (FULL RESTORED LOGIC)
========================= */

function renderMovies() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    const categories = [...new Set(movies.map(m => m.category))];

    categories.forEach(cat => {

        let section = `<h2>${cat}</h2><div class="grid">`;

        if (cat === "MovieSet") {
            const sets = [...new Set(movies.filter(m => m.set).map(m => m.set))];

            sets.forEach(setName => {
                let first = movies.find(m => m.set === setName);

                section += `
                <div class="card" onclick="openSet('${setName}')">
                    <img src="${first.img}">
                    <div class="title">${setName}</div>
                </div>`;
            });

        } else {
            movies.filter(m => m.category === cat).forEach(m => {
                section += `
                <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
                    <img src="${m.img}">
                    <div class="title">${m.title}</div>
                </div>`;
            });
        }

        section += `</div>`;
        app.innerHTML += section;
    });
}

/* MOVIE SET (RESTORED) */
function openSet(name) {
    const app = document.getElementById("app");

    app.innerHTML = `<button onclick="renderMovies()">⬅ Back</button><h2>${name}</h2><div class="grid">`;

    movies.filter(m => m.set === name).forEach(m => {
        app.innerHTML += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <div class="title">${m.title}</div>
        </div>`;
    });

    app.innerHTML += `</div>`;
}

/* =========================
   SERIES (UNCHANGED LOGIC STYLE)
========================= */

function renderSeries() {
    const app = document.getElementById("app");
    let html = `<h2>Series</h2><div class="grid">`;

    seriesList.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <div class="title">${s.title}</div>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
}

function openSeries(id) {
    let s = seriesList.find(x => x.id === id);

    let html = `<button onclick="renderSeries()">⬅ Back</button><h2>${s.title}</h2><div class="grid">`;

    s.seasons.forEach(se => {
        for (let i = 1; i <= se.episodes; i++) {
            html += `
            <div class="card" onclick="playEpisode('${s.tmdb_id}', ${se.season}, ${i})">
                <div class="title">S${se.season}E${i}</div>
            </div>`;
        }
    });

    html += `</div>`;
    document.getElementById("app").innerHTML = html;
}

/* =========================
   PLAYER (UNCHANGED CORE)
========================= */

function playMovie(m) {
    const v = document.getElementById("videoPlayer");
    const f = document.getElementById("frame");

    v.pause();
    v.removeAttribute("src");
    v.load();

    f.src = "";
    f.style.display = "none";
    v.style.display = "none";

    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }

    if (m.video) {
        v.style.display = "block";

        if (m.video.includes(".m3u8")) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(m.video);
                hlsInstance.attachMedia(v);
            } else v.src = m.video;
        } else v.src = m.video;

        v.play().catch(()=>{});
    } else {
        f.src = `https://www.2embed.cc/embed/${m.id}`;
        f.style.display = "block";
    }

    document.getElementById("player").style.display = "flex";
}

function playEpisode(tmdb, s, e) {
    document.getElementById("frame").style.display = "block";
    document.getElementById("frame").src =
        `https://www.2embed.cc/embedtv/${tmdb}&s=${s}&e=${e}`;

    document.getElementById("player").style.display = "flex";
}

function closePlayer() {
    document.getElementById("player").style.display = "none";
}

/* =========================
   GLOBAL SEARCH (MOVIES + SERIES + SETS)
========================= */

document.getElementById("search").addEventListener("input", function () {
    let val = this.value.toLowerCase();

    if (!val) return render();

    const app = document.getElementById("app");

    let movieRes = movies.filter(m => m.title.toLowerCase().includes(val));
    let seriesRes = seriesList.filter(s => s.title.toLowerCase().includes(val));

    let html = `<h2>Search Results</h2><div class="grid">`;

    movieRes.forEach(m => {
        html += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <div class="title">${m.title}</div>
        </div>`;
    });

    seriesRes.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <div class="title">${s.title}</div>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
});

</script>
</body>
</html>
