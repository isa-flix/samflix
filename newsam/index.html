<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Series</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #141414;
    color: white;
}

h1 { padding: 20px; }

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card { cursor: pointer; }

.card img {
    width: 100%;
    border-radius: 10px;
}

/* PLAYER */
#player {
    padding: 20px;
}

video, iframe {
    width: 100%;
    height: 500px;
    border: none;
    background: black;
}

/* EPISODES */
.controls {
    padding: 0 20px;
}

.episode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    padding: 20px;
}

.ep-btn {
    background: #222;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    font-size: 12px;
}

.ep-btn.active {
    background: #e50914;
}

.ep-btn img {
    width: 100%;
    border-radius: 5px;
}

/* BUTTON */
button {
    margin: 10px;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>SamFlix Series</h1>
<div id="app"></div>

<script>

/* ================= DATA ================= */

let seriesList = [
    {
        id: "breaking_bad",
        title: "Breaking Bad",
        img: "https://image.tmdb.org/t/p/w500/eSzpy96DwBujGFj0xMbXBcGcfxX.jpg",
        tmdb_id: "1396",
        seasons: [
            { season: 1, episodes: 7 },
            { season: 2, episodes: 13 }
        ]
    }
];

let current = {};

/* ================= HOME ================= */

function showSeries() {
    let html = '<div class="grid">';
    seriesList.forEach(s => {
        html += `
            <div class="card" onclick="openSeries('${s.id}')">
                <img src="${s.img}">
                <p>${s.title}</p>
            </div>
        `;
    });
    html += '</div>';
    document.getElementById("app").innerHTML = html;
}

/* ================= SERIES ================= */

function openSeries(id) {
    let s = seriesList.find(x => x.id === id);

    current = {
        id: id,
        season: 1,
        episode: 1
    };

    let saved = JSON.parse(localStorage.getItem(id));
    if (saved) current = saved;

    let html = `
        <button onclick="showSeries()">⬅ Back</button>
        <h2>${s.title}</h2>

        <div class="controls">
            Season:
            <select onchange="changeSeason('${id}', this.value)">
    `;

    s.seasons.forEach(se => {
        html += `<option value="${se.season}" ${se.season == current.season ? "selected":""}>Season ${se.season}</option>`;
    });

    html += `</select></div>`;

    html += `<div id="episodes"></div><div id="player"></div>`;

    document.getElementById("app").innerHTML = html;

    renderEpisodes(s);
    playEpisode(current.season, current.episode);
}

/* ================= EPISODES ================= */

function renderEpisodes(s) {
    let seasonData = s.seasons.find(x => x.season == current.season);

    let html = `<div class="episode-grid">`;

    for (let ep = 1; ep <= seasonData.episodes; ep++) {

        let thumb = `https://image.tmdb.org/t/p/w300/${s.tmdb_id}_S${current.season}_E${ep}.jpg`;

        html += `
            <div class="ep-btn ${ep == current.episode ? "active":""}"
            onclick="playEpisode(${current.season}, ${ep})">
                <img src="${thumb}" onerror="this.style.display='none'">
                S${current.season}E${ep}
            </div>
        `;
    }

    html += `</div>`;
    document.getElementById("episodes").innerHTML = html;
}

/* ================= CHANGE SEASON ================= */

function changeSeason(id, season) {
    current.season = season;
    current.episode = 1;
    let s = seriesList.find(x => x.id === id);
    renderEpisodes(s);
}

/* ================= PLAY ================= */

function playEpisode(season, episode) {
    current.season = season;
    current.episode = episode;

    let s = seriesList.find(x => x.id === current.id);

    localStorage.setItem(current.id, JSON.stringify(current));

    renderEpisodes(s);

    let url = `https://www.2embed.cc/embedtv/${s.tmdb_id}&s=${season}&e=${episode}`;

    document.getElementById("player").innerHTML = `
        <iframe src="${url}" allowfullscreen></iframe>
    `;

    document.getElementById("player").scrollIntoView({ behavior: "smooth" });

    // AUTO NEXT (iframe fallback not perfect)
    setTimeout(() => {
        current.episode++;
        if (current.episode <= s.seasons.find(x=>x.season==season).episodes) {
            // optional auto next trigger (disabled by default)
        }
    }, 30000);
}

/* ================= INIT ================= */

showSeries();

</script>

</body>
</html>
