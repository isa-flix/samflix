<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    background: #141414;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

h2 {
    margin: 20px 10px 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

.movie {
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.movie:hover {
    transform: scale(1.08);
}

.player {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

video, iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    z-index: 1000;
}

@media (max-width:600px){
    .grid { gap: 8px; }
    .logo { font-size: 22px; }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Search movies...">
    </div>
</div>

<div id="mainContainer"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const movies = [
    // 🎬 MP4 TEST
    {
        id: "mp4_test",
        title: "MP4 Test Video",
        img: "https://peach.blender.org/wp-content/uploads/title_anouncement.jpg",
        category: "Movies test",
        video: "https://www.w3schools.com/html/mov_bbb.mp4"
    },

    // 📺 HLS TEST
    {
        id: "hls_test",
        title: "HLS Test Stream",
        img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Big_Buck_Bunny_full_movie_cover.png/800px-Big_Buck_Bunny_full_movie_cover.png",
        category: "Movies test",
        video: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
    },

    // 🎞 Movie Set (FIXED SET NAME CONSISTENCY)
    {
        id: "1",
        title: "Toy Story",
        img: "https://image.tmdb.org/t/p/w500/uXDfjJbdP4ijW5hWSBrPrlKpxab.jpg",
        category: "MovieSet test",
        set: "Toy Story",
        video: "https://www.w3schools.com/html/mov_bbb.mp4"
    },
    {
        id: "2",
        title: "Toy Story 2",
        img: "https://image.tmdb.org/t/p/w500/4rbcp3ng8n1MKHjpeqW0L7Fnpzz.jpg",
        category: "MovieSet test",
        set: "Toy Story",
        video: "https://www.w3schools.com/html/movie.mp4"
    },

    // CARTOONS
    {"id": "tt27613895", title: "GOAT", img: "...", category: "Cartoons"},
    {"id": "tt15678738", title: "David", img: "...", category: "Cartoons"},
    {"id": "tt26443616", title: "Hoppers", img: "...", category: "Cartoons"},

    // MOVIES
    { id: "tt15398776", title: "Oppenheimer", img: "...", category: "Movie" },
    { id: "tt12042730", title: "Project Hail Mary", img: "...", category: "Movie" },
    { id: "tt1375666", title: "Inception", img: "...", category: "Movie" },
    { id: "tt0816692", title: "Interstellar", img: "...", category: "Movie" },
    { id: "tt0468569", title: "Dark Knight", img: "...", category: "Movie" },
    { id: "tt0111161", title: "Shawshank", img: "...", category: "Movie" },

    // MOVIE SETS (UNCHANGED)
    {"id": "tt0114709", title: "Toy Story", img: "...", category: "MovieSet", set: "Toy story"},
    {"id": "tt0120363", title: "Toy Story 2", img: "...", category: "MovieSet", set: "Toy story"},
    {"id": "tt0435761", title: "Toy Story 3", img: "...", category: "MovieSet", set: "Toy story"},
    {"id": "tt1979376", title: "Toy Story 4", img: "...", category: "MovieSet", set: "Toy story"},

    {"id": "tt1490017", title: "The LEGO Movie", img: "...", category: "MovieSet", set: "The Lego Movie"},
    {"id": "tt3513498", title: "The LEGO Movie 2", img: "...", category: "MovieSet", set: "The Lego Movie"},

    {"id": "tt3794354", title: "Sonic 1", img: "...", category: "MovieSet", set: "Sonic"},
    {"id": "tt12412888", title: "Sonic 2", img: "...", category: "MovieSet", set: "Sonic"}
];

/* FIXED GROUPING */
function buildSets(){
    const sets = {};
    movies
        .filter(m => m.category.toLowerCase().includes("movieset"))
        .forEach(m=>{
            if(!sets[m.set]) sets[m.set]=[];
            sets[m.set].push(m);
        });
    return sets;
}

/* HOME */
function displayAll(){
    const container=document.getElementById("mainContainer");
    container.innerHTML="";

    const sets=buildSets();

    const setSection=document.createElement("div");
    setSection.innerHTML="<h2>Movie Sets</h2>";

    const setGrid=document.createElement("div");
    setGrid.className="grid";

    Object.keys(sets).forEach(name=>{
        const first=sets[name][0];

        const card=document.createElement("div");
        card.className="movie";

        card.innerHTML=`
            <img src="${first.img}">
            <div class="title">${name}</div>
        `;

        card.onclick=()=>openSet(name,sets[name]);
        setGrid.appendChild(card);
    });

    setSection.appendChild(setGrid);
    container.appendChild(setSection);

    /* ALL OTHER CATEGORIES */
    const categories = [...new Set(movies.map(m => m.category))];

    categories.forEach(cat=>{
        if(cat.toLowerCase().includes("movieset")) return;

        const section=document.createElement("div");
        section.innerHTML=`<h2>${cat}</h2>`;

        const grid=document.createElement("div");
        grid.className="grid";

        movies.filter(m=>m.category===cat)
        .forEach(m=>grid.appendChild(createCard(m)));

        section.appendChild(grid);
        container.appendChild(section);
    });
}

/* SET */
function openSet(name,list){
    const container=document.getElementById("mainContainer");
    container.innerHTML="";

    const back=document.createElement("button");
    back.innerText="← Back";
    back.style.margin="10px";
    back.onclick=displayAll;

    const title=document.createElement("h2");
    title.innerText=name;

    const grid=document.createElement("div");
    grid.className="grid";

    list.forEach(m=>grid.appendChild(createCard(m)));

    container.appendChild(back);
    container.appendChild(title);
    container.appendChild(grid);
}

/* CARD */
function createCard(movie){
    const div=document.createElement("div");
    div.className="movie";

    div.innerHTML=`
        <img src="${movie.img}">
        <div class="title">${movie.title}</div>
    `;

    div.onclick=()=>playMovie(movie);
    return div;
}

/* PLAYER FIXED */
function playMovie(movie){
    const video=document.getElementById("videoPlayer");
    const frame=document.getElementById("frame");

    video.pause();
    video.src="";
    frame.src="";

    video.style.display="none";
    frame.style.display="none";

    if(movie.video){
        if(movie.video.endsWith(".mp4")){
            video.src=movie.video;
            video.style.display="block";
            video.play();
        }
        else if(movie.video.endsWith(".m3u8")){
            video.style.display="block";

            if(Hls.isSupported()){
                const hls=new Hls();
                hls.loadSource(movie.video);
                hls.attachMedia(video);
            } else {
                video.src=movie.video;
            }
        }
    } else {
        frame.src=`https://www.2embed.cc/embed/${movie.id}`;
        frame.style.display="block";
    }

    document.getElementById("player").style.display="flex";
}

/* CLOSE */
function closePlayer(){
    const video=document.getElementById("videoPlayer");
    const frame=document.getElementById("frame");

    video.pause();
    video.src="";
    frame.src="";
    document.getElementById("player").style.display="none";
}

/* SEARCH FIXED (ALL FIELDS) */
document.getElementById("search").addEventListener("input",function(){
    const val=this.value.toLowerCase();

    const filtered=movies.filter(m =>
        (m.title || "").toLowerCase().includes(val)
    );

    const container=document.getElementById("mainContainer");
    container.innerHTML="<h2>Search Results</h2>";

    const grid=document.createElement("div");
    grid.className="grid";

    filtered.forEach(m=>grid.appendChild(createCard(m)));

    container.appendChild(grid);
});

/* INIT */
displayAll();
</script>

</body>
</html>
