<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix IPTV Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* Navbar */
.navbar {
    padding: 15px;
    font-size: 22px;
    background: black;
}

/* Layout */
.container {
    display: flex;
}

/* Player */
.player {
    flex: 2;
    padding: 10px;
}

video {
    width: 100%;
    height: 60vh;
    background: black;
}

/* Sidebar */
.sidebar {
    flex: 1;
    background: #1a1a1a;
    overflow-y: auto;
    max-height: 80vh;
}

/* Group */
.group {
    padding: 10px;
    background: #222;
    font-weight: bold;
}

/* Channel */
.channel {
    display: flex;
    align-items: center;
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #333;
}

.channel:hover {
    background: #333;
}

.channel.active {
    background: #555;
}

.channel img {
    width: 40px;
    height: 40px;
    margin-right: 10px;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="navbar">📺 SamFlix IPTV Pro</div>

<div class="container">
    <div class="player">
        <video id="video" controls autoplay></video>
    </div>

    <div class="sidebar" id="sidebar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// ✅ CHANGE THIS to your local file
const M3U_URL = "chanel.m3u";

const video = document.getElementById("video");
const sidebar = document.getElementById("sidebar");

let currentActive = null;

// 🔥 Advanced M3U parser
function parseM3U(data) {
    const lines = data.split("\n");
    const channels = [];
    let current = {};

    lines.forEach(line => {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
            current = {};

            const name = line.split(",")[1];
            current.name = name;

            // Extract attributes
            const logoMatch = line.match(/tvg-logo="(.*?)"/);
            const groupMatch = line.match(/group-title="(.*?)"/);

            current.logo = logoMatch ? logoMatch[1] : "";
            current.group = groupMatch ? groupMatch[1] : "Other";
        }
        else if (line && !line.startsWith("#")) {
            current.url = line;
            channels.push(current);
        }
    });

    return channels;
}

// 🎯 Group channels
function groupChannels(channels) {
    const groups = {};

    channels.forEach(ch => {
        if (!groups[ch.group]) groups[ch.group] = [];
        groups[ch.group].push(ch);
    });

    return groups;
}

// ▶️ Play stream
function playStream(url, element) {
    if (currentActive) currentActive.classList.remove("active");
    element.classList.add("active");
    currentActive = element;

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
    }
}

// 🚀 Load M3U
fetch(M3U_URL)
    .then(res => res.text())
    .then(data => {
        const channels = parseM3U(data);
        const grouped = groupChannels(channels);

        Object.keys(grouped).forEach(group => {

            const groupDiv = document.createElement("div");
            groupDiv.className = "group";
            groupDiv.innerText = group;
            sidebar.appendChild(groupDiv);

            grouped[group].forEach(ch => {
                const div = document.createElement("div");
                div.className = "channel";

                div.innerHTML = `
                    <img src="${ch.logo || 'https://via.placeholder.com/40'}">
                    <span>${ch.name}</span>
                `;

                div.onclick = () => playStream(ch.url, div);

                sidebar.appendChild(div);
            });
        });

        // Auto play first
        const first = document.querySelector(".channel");
        if (first) first.click();
    });

</script>

</body>
</html>
