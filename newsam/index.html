<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Series</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #141414;
    color: white;
}

h1 { padding: 20px; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card { cursor: pointer; }

.card img {
    width: 100%;
    border-radius: 10px;
}

#player {
    padding: 20px;
}

video, iframe {
    width: 100%;
    height: 500px;
    border: none;
    background: black;
}

.episode {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.episode:hover {
    background: #333;
}

button {
    margin: 10px;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>SamFlix Series</h1>
<div id="app"></div>

<script>

/* ================= DATA ================= */

let seriesList = [
    {
        id: "breaking_bad",
        title: "Breaking Bad (2embed)",
        img: "https://image.tmdb.org/t/p/w500/eSzpy96DwBujGFj0xMbXBcGcfxX.jpg",
        tmdb_id: "1396",
        seasons: [{ season: 1, episodes: 7 }]
    },
    {
        id: "direct_mp4",
        title: "MP4 Test",
        img: "https://peach.blender.org/wp-content/uploads/title_anouncement.jpg",
        type: "direct",
        episodes: [
            { title: "Episode 1", video: "https://www.w3schools.com/html/mov_bbb.mp4" }
        ]
    },
    {
        id: "hls_test",
        title: "HLS Stream",
        img: "https://dummyimage.com/300x450/000/fff&text=HLS",
        type: "direct",
        episodes: [
            { title: "Episode 1", video: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ]
    }
];

/* ================= SHOW SERIES ================= */

function showSeries() {
    let html = '<div class="grid">';

    seriesList.forEach(s => {
        html += `
            <div class="card" onclick="openSeries('${s.id}')">
                <img src="${s.img}">
                <p>${s.title}</p>
            </div>
        `;
    });

    html += '</div>';
    document.getElementById("app").innerHTML = html;
}

/* ================= OPEN SERIES ================= */

function openSeries(id) {
    let s = seriesList.find(x => x.id === id);

    let html = `
        <button onclick="showSeries()">⬅ Back</button>
        <h2>${s.title}</h2>
    `;

    // 2EMBED TYPE
    if (s.tmdb_id) {
        s.seasons.forEach(season => {
            html += `<h3>Season ${season.season}</h3>`;
            for (let ep = 1; ep <= season.episodes; ep++) {
                html += `
                    <div class="episode"
                    onclick="playEmbed('${s.tmdb_id}', ${season.season}, ${ep})">
                        Episode ${ep}
                    </div>
                `;
            }
        });
    }

    // DIRECT TYPE
    if (s.type === "direct") {
        s.episodes.forEach((ep, i) => {
            html += `
                <div class="episode"
                onclick="playVideo('${ep.video}')">
                    ${ep.title || "Episode " + (i+1)}
                </div>
            `;
        });
    }

    html += `<div id="player"></div>`;
    document.getElementById("app").innerHTML = html;
}

/* ================= PLAY 2EMBED ================= */

function playEmbed(tmdb, season, episode) {
    let url = `https://www.2embed.cc/embedtv/${tmdb}&s=${season}&e=${episode}`;

    document.getElementById("player").innerHTML = `
        <iframe src="${url}" allowfullscreen></iframe>
    `;
}

/* ================= PLAY VIDEO (AUTO DETECT) ================= */

function playVideo(url) {
    let player = document.getElementById("player");

    // HLS (.m3u8)
    if (url.includes(".m3u8")) {
        player.innerHTML = `<video id="video" controls autoplay></video>`;
        let video = document.getElementById("video");

        if (Hls.isSupported()) {
            let hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
    }

    // MP4 / DIRECT
    else {
        player.innerHTML = `
            <video controls autoplay src="${url}"></video>
        `;
    }
}

/* ================= INIT ================= */

showSeries();

</script>

</body>
</html>
