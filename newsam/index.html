<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Unified</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    background: #141414;
    z-index: 1000;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

.nav-buttons {
    position: fixed;
    top: 10px;
    left: 220px;
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.nav-buttons a {
    padding: 10px;
    background: #111;
    color: white;
    text-decoration: none;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

h2 {
    margin: 20px 10px 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

.card {
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.card p {
    position: absolute;
    bottom: 0;
    width: 100%;
    margin: 0;
    padding: 6px;
    font-size: 13px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.card:hover {
    transform: scale(1.06);
}

.player {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

video, iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>

    <div class="nav-buttons">
        <a onclick="switchView('movies')">🎬</a>
        <a onclick="switchView('series')">📺</a>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search...">
    </div>
</div>

<div id="app"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<script>

/* =========================
   DATA
========================= */

let movies = [
{
    id: "001hls",
    title: "Willow Sports",
    img: "live.png",
    category: "Live Stream",
    video: "https://amg01269-amg01269c1-firetv-us-5377.playouts.now.amagi.tv/playlist.m3u8"
},
{
    id: "tt15398776",
    title: "Oppenheimer",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/2y48XTa483LRFIb5fDKOwr8DHWz.jpg",
    category: "Movie"
}
];

let seriesList = [
{
    id: "stranger_things",
    title: "Stranger Things",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/cVxVGwHce6xnW8UaVUggaPXbmoE.jpg",
    tmdb_id: "66732",
    seasons: [{ season: 1, episodes: 8 }]
}
];

/* =========================
   STATE
========================= */

let currentView = "movies";
let hlsInstance = null;

/* =========================
   INIT
========================= */

document.addEventListener("DOMContentLoaded", () => {
    render();
});

/* =========================
   SWITCH VIEW
========================= */

function switchView(view) {
    currentView = view;
    document.getElementById("search").value = "";
    render();
}

/* =========================
   RENDER
========================= */

function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    if (currentView === "movies") {
        renderMovies(movies);
    } else {
        renderSeries(seriesList);
    }
}

/* =========================
   MOVIES
========================= */

function renderMovies(list) {
    const app = document.getElementById("app");

    let html = `<h2>Movies</h2><div class="grid">`;

    list.forEach(m => {
        html += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <p>${m.title}</p>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
}

/* =========================
   SERIES
========================= */

function renderSeries(list) {
    const app = document.getElementById("app");

    let html = `<h2>Series</h2><div class="grid">`;

    list.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <p>${s.title}</p>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
}

/* =========================
   SERIES OPEN
========================= */

function openSeries(id) {
    let s = seriesList.find(x => x.id === id);

    let html = `
        <button onclick="render()">⬅ Back</button>
        <h2>${s.title}</h2>
        <div class="grid">
    `;

    s.seasons.forEach(se => {
        for (let i = 1; i <= se.episodes; i++) {
            html += `
            <div class="card" onclick="playEpisode('${s.tmdb_id}', ${se.season}, ${i})">
                <p>S${se.season}E${i}</p>
            </div>`;
        }
    });

    html += `</div>`;
    document.getElementById("app").innerHTML = html;
}

/* =========================
   PLAY MOVIE
========================= */

function playMovie(movie) {
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");
    const player = document.getElementById("player");

    video.pause();
    video.removeAttribute("src");
    video.load();

    frame.src = "";
    frame.style.display = "none";
    video.style.display = "none";

    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }

    if (movie.video) {
        video.style.display = "block";

        if (movie.video.endsWith(".m3u8")) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(movie.video);
                hlsInstance.attachMedia(video);
            } else {
                video.src = movie.video;
            }
        } else {
            video.src = movie.video;
        }

        video.play().catch(()=>{});

    } else {
        frame.src = `https://www.2embed.cc/embed/${movie.id}`;
        frame.style.display = "block";
    }

    player.style.display = "flex";
}

/* =========================
   PLAY EPISODE
========================= */

function playEpisode(tmdb, season, ep) {
    const player = document.getElementById("player");
    const frame = document.getElementById("frame");

    frame.style.display = "block";
    frame.src = `https://www.2embed.cc/embedtv/${tmdb}&s=${season}&e=${ep}`;

    player.style.display = "flex";
}

/* =========================
   CLOSE PLAYER
========================= */

function closePlayer() {
    document.getElementById("player").style.display = "none";
    document.getElementById("frame").src = "";

    const video = document.getElementById("videoPlayer");
    video.pause();
}

/* =========================
   GLOBAL SEARCH
========================= */

document.getElementById("search").addEventListener("input", function () {
    let val = this.value.toLowerCase().trim();

    if (!val) return render();

    const app = document.getElementById("app");

    let movieResults = movies.filter(m =>
        (m.title || "").toLowerCase().includes(val)
    );

    let seriesResults = seriesList.filter(s =>
        (s.title || "").toLowerCase().includes(val)
    );

    let html = `<h2>Search Results</h2><div class="grid">`;

    movieResults.forEach(m => {
        html += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <p>${m.title}</p>
        </div>`;
    });

    seriesResults.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <p>${s.title}</p>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
});

</script>

</body>
</html>
