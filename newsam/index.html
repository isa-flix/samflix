<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Free</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: black;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.search {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 200px;
}

/* Grid */
.movies {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    padding: 15px;
}

.movie {
    cursor: pointer;
    transition: transform 0.3s;
}

.movie:hover {
    transform: scale(1.08);
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

/* Player */
.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
}

video {
    width: 90%;
    height: 80%;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

/* Loader */
.loader {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🎬 SamFlix Free</div>
    <input type="text" class="search" id="search" placeholder="Search movies...">
</div>

<div class="movies" id="movies"></div>
<div class="loader" id="loader">Loading...</div>

<div class="player" id="player">
    <div class="close" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls autoplay></video>
</div>

<script>

// 🎬 PUBLIC DOMAIN MOVIES (expand anytime)
const allMovies = [
    {
        title: "2012 Hunger Games",
        img: "https://archive.org/download/night_of_the_living_dead/night_of_the_living_dead.jpg",
        video: "https://mega.nz/file/9DggDbYK#2rJ_dsH7PJMSKcfnSsuRt6SXEQCVVvVeJJYSEoeYET0"
    },
    {
        title: "Nosferatu",
        img: "https://archive.org/download/nosferatu_201705/nosferatu.jpg",
        video: "https://archive.org/download/nosferatu_201705/nosferatu_512kb.mp4"
    },
    {
        title: "The General",
        img: "https://archive.org/download/TheGeneral1926/TheGeneral1926.jpg",
        video: "https://archive.org/download/TheGeneral1926/TheGeneral1926_512kb.mp4"
    },
    {
        title: "The Kid",
        img: "https://archive.org/download/TheKid1921/TheKid1921.jpg",
        video: "https://archive.org/download/TheKid1921/TheKid1921_512kb.mp4"
    },
    {
        title: "Metropolis",
        img: "https://archive.org/download/Metropolis_2010/Metropolis.jpg",
        video: "https://archive.org/download/Metropolis_2010/Metropolis_512kb.mp4"
    },
    {
        title: "Sherlock Jr",
        img: "https://archive.org/download/SherlockJr_201507/SherlockJr.jpg",
        video: "https://archive.org/download/SherlockJr_201507/SherlockJr_512kb.mp4"
    }
];

let visibleMovies = [];
let index = 0;
const batch = 4;

const container = document.getElementById("movies");
const loader = document.getElementById("loader");

// Load movies in chunks (infinite scroll)
function loadMovies() {
    const next = allMovies.slice(index, index + batch);
    visibleMovies = visibleMovies.concat(next);
    renderMovies(next);
    index += batch;

    if (index >= allMovies.length) loader.innerText = "No more movies";
}

function renderMovies(movies) {
    movies.forEach(movie => {
        const div = document.createElement("div");
        div.classList.add("movie");

        div.innerHTML = `
            <img src="${movie.img}">
            <p>${movie.title}</p>
        `;

        div.onclick = () => playMovie(movie.video);

        container.appendChild(div);
    });
}

// Player
function playMovie(url) {
    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");

    video.src = url;
    player.style.display = "flex";
}

function closePlayer() {
    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");

    video.pause();
    video.src = "";
    player.style.display = "none";
}

// Search
document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();
    container.innerHTML = "";

    const filtered = allMovies.filter(m =>
        m.title.toLowerCase().includes(value)
    );

    renderMovies(filtered);
});

// Infinite scroll
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
        loadMovies();
    }
});

// Init
loadMovies();

</script>

</body>
</html>
