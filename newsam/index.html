<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix IPTV</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

.navbar {
    padding: 15px;
    font-size: 22px;
    background: black;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

/* Player */
.player {
    flex: 2;
    padding: 10px;
}

video {
    width: 100%;
    height: 60vh;
    background: black;
}

/* Playlist */
.playlist {
    flex: 1;
    max-height: 70vh;
    overflow-y: auto;
    background: #1a1a1a;
}

.item {
    padding: 10px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

.item:hover {
    background: #333;
}
</style>
</head>

<body>

<div class="navbar">📺 SamFlix IPTV (Dropbox M3U)</div>

<div class="container">
    
    <div class="player">
        <video id="video" controls autoplay></video>
    </div>

    <div class="playlist" id="playlist"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

// ✅ YOUR FIXED DROPBOX LINK
const M3U_URL = "https://www.dropbox.com/scl/fi/193hc1meegjqtja90vgw4/eng.m3u?rlkey=kqbjyvs26m36sme7lmssj3unl&raw=1";

const video = document.getElementById("video");
const playlistDiv = document.getElementById("playlist");

// Parse M3U
function parseM3U(data) {
    const lines = data.split("\n");
    const list = [];
    let name = "";

    lines.forEach(line => {
        line = line.trim();

        if (line.startsWith("#EXTINF")) {
            name = line.split(",")[1];
        } else if (line && !line.startsWith("#")) {
            list.push({ name, url: line });
        }
    });

    return list;
}

// Load playlist
fetch(M3U_URL)
    .then(res => res.text())
    .then(data => {
        const items = parseM3U(data);

        items.forEach(item => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerText = item.name;

            div.onclick = () => playStream(item.url);

            playlistDiv.appendChild(div);
        });

        if (items.length > 0) playStream(items[0].url);
    });

// Play stream
function playStream(url) {
    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
    } else {
        alert("HLS not supported");
    }
}

</script>

</body>
</html>
