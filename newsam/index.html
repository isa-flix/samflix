<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    background: #333;
    color: white;
}

h2 { margin: 20px 10px; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 0 10px 20px;
}

.movie {
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.movie img {
    width: 100%;
    border-radius: 8px;
}

.movie .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

.movie:hover { transform: scale(1.08); }

.player {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 999;
    justify-content: center;
    align-items: center;
}

.player iframe,
.player video {
    width: 90%;
    height: 90%;
    border-radius: 8px;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>
    <input id="search" placeholder="Search...">
</div>

<div id="mainContainer"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>

    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" allowfullscreen style="display:none;"></iframe>
</div>

<script>

// ================= DATA =================
const movies = [

{
  id: "tt1375666",
  title: "Inception",
  img: "https://www.themoviedb.org/t/p/w600_and_h900_face/xlaY2zyzMfkhk0HSC5VUwzoZPU1.jpg",
  category: "05Test",
  video: "https://test-streams.mux.dev/x36xhzz/x36xhzz.mp4"
},

{"id":"tt27613895",title:"GOAT",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/wfuqMlaExcoYiUEvKfVpUTt1v4u.jpg",category:"Cartoons"},
{"id":"tt15678738",title:"David",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/7lFG1WrCwAxBfyGK8ahlBVzXno7.jpg",category:"Cartoons"},

{id:"tt15398776",title:"Oppenheimer",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/2y48XTa483LRFIb5fDKOwr8DHWz.jpg",category:"Movie"},
{id:"tt0816692",title:"Interstellar",img:"https://www.themoviedb.org/t/p/w600_and_h900_face/yQvGrMoipbRoddT0ZR8tPoR7NfX.jpg",category:"Movie"},

{"id":"tt0114709",title:"Toy Story",img:"https://www.themoviedb.org/t/p/w1280/uXDfjJbdP4ijW5hWSBrPrlKpxab.jpg",category:"MovieSet",set:"Toy story"},
{"id":"tt0120363",title:"Toy Story 2",img:"https://www.themoviedb.org/t/p/w1280/4rbcp3ng8n1MKHjpeqW0L7Fnpzz.jpg",category:"MovieSet",set:"Toy story"}

];

// ================= UI =================

function buildSets() {
    const sets = {};
    movies.filter(m => m.category === "MovieSet").forEach(m => {
        if (!sets[m.set]) sets[m.set] = [];
        sets[m.set].push(m);
    });
    return sets;
}

function displayAll() {
    const container = document.getElementById("mainContainer");
    container.innerHTML = "";

    const sets = buildSets();

    // Movie sets
    container.innerHTML += "<h2>Movie Sets</h2>";
    const setGrid = document.createElement("div");
    setGrid.className = "grid";

    Object.keys(sets).forEach(name => {
        const m = sets[name][0];

        const card = document.createElement("div");
        card.className = "movie";
        card.innerHTML = `<img src="${m.img}"><div class="title">${name}</div>`;
        card.onclick = () => openSet(name, sets[name]);

        setGrid.appendChild(card);
    });

    container.appendChild(setGrid);

    // Other categories
    const categories = [...new Set(movies.map(m => m.category))];

    categories.forEach(cat => {
        if (cat === "MovieSet") return;

        container.innerHTML += `<h2>${cat}</h2>`;
        const grid = document.createElement("div");
        grid.className = "grid";

        movies.filter(m => m.category === cat)
              .forEach(m => grid.appendChild(createCard(m)));

        container.appendChild(grid);
    });
}

function openSet(name, list) {
    const container = document.getElementById("mainContainer");
    container.innerHTML = `<button onclick="displayAll()">← Back</button><h2>${name}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    list.forEach(m => grid.appendChild(createCard(m)));
    container.appendChild(grid);
}

function createCard(movie) {
    const div = document.createElement("div");
    div.className = "movie";

    div.innerHTML = `<img src="${movie.img}"><div class="title">${movie.title}</div>`;
    div.onclick = () => playMovie(movie);

    return div;
}

// ================= PLAYER =================

function playMovie(movie) {
    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    // RESET
    video.pause();
    video.removeAttribute("src");
    video.load();

    frame.src = "";
    video.style.display = "none";
    frame.style.display = "none";

    // PLAY
    if (movie.video) {
        video.style.display = "block";
        video.src = movie.video;

        video.play().catch(() => {
            alert("Video blocked, press play manually");
        });

    } else if (movie.id) {
        frame.style.display = "block";
        frame.src = `https://vidsrc.to/embed/movie/${movie.id}`;
    } else {
        alert("No source");
        return;
    }

    player.style.display = "flex";
}

function closePlayer() {
    const video = document.getElementById("videoPlayer");
    const frame = document.getElementById("frame");

    video.pause();
    video.removeAttribute("src");
    video.load();

    frame.src = "";
    document.getElementById("player").style.display = "none";
}

// ================= SEARCH =================

document.getElementById("search").addEventListener("input", function () {
    const value = this.value.toLowerCase();
    const container = document.getElementById("mainContainer");

    container.innerHTML = "<h2>Search</h2>";

    const grid = document.createElement("div");
    grid.className = "grid";

    movies.filter(m => m.title.toLowerCase().includes(value))
          .forEach(m => grid.appendChild(createCard(m)));

    container.appendChild(grid);
});

displayAll();

</script>

</body>
</html>
