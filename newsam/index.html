<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix merge</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: white;
}

/* NAV */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    position: sticky;
    top: 0;
    background: #141414;
    z-index: 999;
}

.logo {
    color: red;
    font-size: 28px;
    font-weight: bold;
}

.search-box input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 200px;
    background: #333;
    color: white;
}

.nav-buttons {
    position: fixed;
    top: 10px;
    left: 220px;
    display: flex;
    gap: 10px;
}

.nav-buttons a {
    padding: 10px;
    background: #111;
    border-radius: 50%;
    cursor: pointer;
}

/* GRID */
h2 {
    margin: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 10px;
}

.set-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.card .title {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 6px;
    font-size: 13px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
}

.card:hover {
    transform: scale(1.05);
}

/* PLAYER */
.player {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

video, iframe {
    width: 90%;
    height: 90%;
    border: none;
    border-radius: 10px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

button {
    margin: 10px;
    padding: 8px 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SamFlix</div>

    <div class="nav-buttons">
        <a onclick="switchView('movies')">🎬</a>
        <a onclick="switchView('series')">📺</a>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search...">
    </div>
</div>

<div id="app"></div>

<div class="player" id="player">
    <div class="close-btn" onclick="closePlayer()">✖</div>
    <video id="videoPlayer" controls style="display:none;"></video>
    <iframe id="frame" style="display:none;"></iframe>
</div>

<script>

/* ================= DATA ================= */

let movies = [
{
    id: "001hls",
    title: "Willow Sports",
    img: "live.png",
    category: "Live Stream",
    video: "https://amg01269-amg01269c1-firetv-us-5377.playouts.now.amagi.tv/playlist.m3u8"
},
{
    id: "tt15398776",
    title: "Oppenheimer",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/2y48XTa483LRFIb5fDKOwr8DHWz.jpg",
    category: "Movie"
},
{
    id: "tt0317219",
    title: "Cars 2006",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/u4G8EkiIBZYx0wEg2xDlXZigTOZ.jpg",
    category: "MovieSet",
    set: "Cars"
},
{
    id: "tt1216475",
    title: "Cars 2",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/vu2PuKtP24Php0vKzhEKbqft59Q.jpg",
    category: "MovieSet",
    set: "Cars"
}
];

let seriesList = [
{
    id: "stranger_things",
    title: "Stranger Things",
    img: "https://www.themoviedb.org/t/p/w600_and_h900_face/cVxVGwHce6xnW8UaVUggaPXbmoE.jpg",
    tmdb_id: "66732",
    seasons: [
        { season: 1, episodes: 8 },
        { season: 2, episodes: 9 }
    ]
}
];

/* ================= STATE ================= */

let currentView = "movies";
let hlsInstance = null;

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", render);

/* ================= SWITCH ================= */

function switchView(v) {
    currentView = v;
    document.getElementById("search").value = "";
    render();
}

function render() {
    if (currentView === "movies") renderMovies();
    else renderSeries();
}

/* ================= MOVIES ================= */

function renderMovies() {
    const app = document.getElementById("app");
    app.innerHTML = "";

    const cats = [...new Set(movies.map(m => m.category))];

    cats.forEach(cat => {

        let html = `<h2>${cat}</h2>`;

        if (cat === "MovieSet") {

            const sets = [...new Set(movies.filter(m => m.set).map(m => m.set))];

            html += `<div class="grid">`;

            sets.forEach(set => {
                const first = movies.find(m => m.set === set);

                html += `
                <div class="card" onclick="openSet('${set}')">
                    <img src="${first.img}">
                    <div class="title">${set}</div>
                </div>`;
            });

            html += `</div>`;

        } else {

            html += `<div class="grid">`;

            movies.filter(m => m.category === cat).forEach(m => {
                html += `
                <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
                    <img src="${m.img}">
                    <div class="title">${m.title}</div>
                </div>`;
            });

            html += `</div>`;
        }

        app.innerHTML += html;
    });
}

/* SET PAGE FIXED */
function openSet(name) {
    const app = document.getElementById("app");

    app.innerHTML = `
        <button onclick="renderMovies()">⬅ Back</button>
        <h2>${name}</h2>
        <div class="set-grid">
    `;

    movies.filter(m => m.set === name).forEach(m => {
        app.innerHTML += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <div class="title">${m.title}</div>
        </div>`;
    });

    app.innerHTML += `</div>`;
}

/* ================= SERIES ================= */

function renderSeries() {
    const app = document.getElementById("app");

    let html = `<h2>Series</h2><div class="grid">`;

    seriesList.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <div class="title">${s.title}</div>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
}

function openSeries(id) {
    let s = seriesList.find(x => x.id === id);

    let html = `
    <button onclick="renderSeries()">⬅ Back</button>
    <h2>${s.title}</h2>

    Season:
    <select onchange="changeSeason('${id}', this.value)">
    `;

    s.seasons.forEach(se => {
        html += `<option value="${se.season}">Season ${se.season}</option>`;
    });

    html += `</select><div id="episodes"></div>`;

    document.getElementById("app").innerHTML = html;

    renderEpisodes(s, s.seasons[0].season);
}

function changeSeason(id, season) {
    let s = seriesList.find(x => x.id === id);
    renderEpisodes(s, parseInt(season));
}

function renderEpisodes(s, season) {
    let data = s.seasons.find(x => x.season == season);

    let html = `<div class="grid">`;

    for (let i = 1; i <= data.episodes; i++) {
        html += `
        <div class="card" onclick="playEpisode('${s.tmdb_id}', ${season}, ${i})">
            <div class="title">E${i}</div>
        </div>`;
    }

    html += `</div>`;

    document.getElementById("episodes").innerHTML = html;
}

/* ================= PLAYER FIXED ================= */

function playMovie(m) {
    const v = document.getElementById("videoPlayer");
    const f = document.getElementById("frame");

    stop();

    if (m.video) {
        v.style.display = "block";
        f.style.display = "none";

        if (m.video.includes(".m3u8")) {
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(m.video);
                hlsInstance.attachMedia(v);
            } else v.src = m.video;
        } else v.src = m.video;

        v.play().catch(()=>{});

    } else {
        f.style.display = "block";
        f.src = `https://www.2embed.cc/embed/${m.id}`;
    }

    document.getElementById("player").style.display = "flex";
}

function playEpisode(tmdb, s, e) {
    stop();

    const f = document.getElementById("frame");
    f.style.display = "block";
    f.src = `https://www.2embed.cc/embedtv/${tmdb}&s=${s}&e=${e}`;

    document.getElementById("player").style.display = "flex";
}

function closePlayer() {
    stop();
    document.getElementById("player").style.display = "none";
}

function stop() {
    const v = document.getElementById("videoPlayer");
    const f = document.getElementById("frame");

    v.pause();
    v.removeAttribute("src");
    v.load();

    f.src = "";

    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
}

/* ================= SEARCH ================= */

document.getElementById("search").addEventListener("input", function () {
    let val = this.value.toLowerCase();

    if (!val) return render();

    const app = document.getElementById("app");

    let mv = movies.filter(m => m.title.toLowerCase().includes(val));
    let sv = seriesList.filter(s => s.title.toLowerCase().includes(val));

    let html = `<h2>Search Results</h2><div class="grid">`;

    mv.forEach(m => {
        html += `
        <div class="card" onclick='playMovie(${JSON.stringify(m)})'>
            <img src="${m.img}">
            <div class="title">${m.title}</div>
        </div>`;
    });

    sv.forEach(s => {
        html += `
        <div class="card" onclick="openSeries('${s.id}')">
            <img src="${s.img}">
            <div class="title">${s.title}</div>
        </div>`;
    });

    html += `</div>`;
    app.innerHTML = html;
});

</script>
</body>
</html>
