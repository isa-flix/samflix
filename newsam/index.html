<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamFlix Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#141414; color:white; font-family:Arial; }

h1 { padding:20px; }

.row {
    padding: 20px;
}

.row h2 {
    margin-bottom: 10px;
}

.slider {
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.card {
    min-width:150px;
    cursor:pointer;
}

.card img {
    width:100%;
    border-radius:8px;
}

/* PLAYER */
#player video, #player iframe {
    width:100%;
    height:500px;
    background:black;
}

/* EPISODES */
.episode-row {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.ep {
    min-width:120px;
    cursor:pointer;
    background:#222;
    padding:5px;
    border-radius:6px;
}

.ep.active { background:#e50914; }

.ep img {
    width:100%;
    border-radius:5px;
}

/* SEARCH */
input {
    width:90%;
    margin:10px;
    padding:10px;
}
</style>
</head>

<body>

<h1>SamFlix Pro</h1>
<input placeholder="Search series..." oninput="search(this.value)">
<div id="app"></div>

<script>

const API_KEY = "b824da48e49048e6783eb8e6b585c7d9";

/* ================= STATE ================= */

let trending = [];
let currentShow = null;
let currentEp = {};

/* ================= FETCH TRENDING ================= */

async function loadTrending() {
    let res = await fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${API_KEY}`);
    let data = await res.json();
    trending = data.results;
    renderHome();
}

/* ================= HOME ================= */

function renderHome() {
    let html = `<div class="row"><h2>Trending</h2><div class="slider">`;

    trending.forEach(show => {
        html += `
            <div class="card" onclick="openShow(${show.id})">
                <img src="https://image.tmdb.org/t/p/w300${show.poster_path}">
            </div>
        `;
    });

    html += `</div></div>`;
    document.getElementById("app").innerHTML = html;
}

/* ================= SEARCH ================= */

async function search(q) {
    if (!q) return renderHome();

    let res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}`);
    let data = await res.json();

    let html = `<div class="row"><h2>Results</h2><div class="slider">`;

    data.results.forEach(show => {
        html += `
            <div class="card" onclick="openShow(${show.id})">
                <img src="https://image.tmdb.org/t/p/w300${show.poster_path}">
            </div>
        `;
    });

    html += `</div></div>`;
    document.getElementById("app").innerHTML = html;
}

/* ================= OPEN SHOW ================= */

async function openShow(id) {
    let res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
    let show = await res.json();
    currentShow = show;

    let html = `<button onclick="renderHome()">⬅ Back</button>`;
    html += `<h2>${show.name}</h2>`;

    for (let s of show.seasons) {
        if (s.season_number === 0) continue;

        html += `<h3>Season ${s.season_number}</h3><div class="episode-row">`;

        let res2 = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s.season_number}?api_key=${API_KEY}`);
        let season = await res2.json();

        season.episodes.forEach(ep => {
            html += `
                <div class="ep" onclick="playEpisode(${id},${s.season_number},${ep.episode_number})">
                    <img src="https://image.tmdb.org/t/p/w300${ep.still_path}">
                    S${s.season_number}E${ep.episode_number}
                </div>
            `;
        });

        html += `</div>`;
    }

    html += `<div id="player"></div>`;
    document.getElementById("app").innerHTML = html;
}

/* ================= PLAYER ================= */

function playEpisode(id, season, episode) {
    currentEp = {id, season, episode};

    let player = document.getElementById("player");

    let embed = `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${episode}`;
    let fallback = `https://vidsrc.to/embed/tv/${id}/${season}/${episode}`;

    player.innerHTML = `
        <iframe src="${embed}" onerror="this.src='${fallback}'" allowfullscreen></iframe>
    `;

    localStorage.setItem("continue", JSON.stringify(currentEp));
}

/* ================= INIT ================= */

loadTrending();

</script>

</body>
</html>
